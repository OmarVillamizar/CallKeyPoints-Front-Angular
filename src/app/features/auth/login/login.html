<main class="login">
  <section class="card" animate.enter="card-enter">
    <header class="brand">
      <div class="brand__mark" aria-hidden="true">CK</div>
      <h1 class="brand__title">Bienvenido de nuevo</h1>
      <p class="brand__sub">Inicia sesión para gestionar tus reportes</p>
    </header>

    <form class="form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Correo</label>
        <input
          id="email"
          type="email"
          autocomplete="email"
          formControlName="email"
          [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          formControlName="password"
          [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
      </div>

      @if (errorMsg(); as msg) {
        <p class="alert" role="alert" animate.enter="alert-enter">
          <ng-icon name="phosphorWarning" />
          <span>{{ msg }}</span>
        </p>
      }

      <button type="submit" class="btn" [disabled]="loading()">
        {{ loading() ? 'Iniciando sesión…' : 'Iniciar sesión' }}
      </button>
    </form>
  </section>
</main>
