<main class="home">
  <div class="panel" animate.enter="panel-enter">
    <span class="eyebrow">Fase 1 · verificación</span>
    <h1>Sesión activa</h1>
    <p class="who">{{ email() ?? 'usuario' }}</p>

    <div class="status">
      @if (calls.loading()) {
        <span class="muted">Cargando casos…</span>
      } @else if (calls.error(); as err) {
        <span class="err">{{ err }}</span>
      } @else {
        <span class="muted">Casos cargados: <strong class="tnum">{{ calls.count() }}</strong></span>
      }
    </div>

    <div class="actions">
      <button type="button" class="btn btn--ghost" (click)="calls.reload()">Recargar casos</button>
      <button type="button" class="btn" (click)="signOut()">Cerrar sesión</button>
    </div>
  </div>
</main>
